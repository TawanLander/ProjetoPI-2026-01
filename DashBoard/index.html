<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo ChartJS</title>
    <link rel="stylesheet" href="source/style.css" />
    <link rel="icon" href="https://imgs.search.brave.com/UsZdzcgzetWNrKE34zhFobRvljzQ3FPOM-w8JJddvKM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMudmV4ZWxzLmNv/bS9tZWRpYS91c2Vy/cy8zLzE5OTk3MC9p/c29sYXRlZC9wcmV2/aWV3L2M0NjVmYTc0/Yzg5NGI0ZWJiMTU5/MDAzZjg0NWYxNzJk/LWljb25lLWRlLXRl/cm1vbWV0cm8tYWx0/by5wbmc">
  </head>
  <body>
    <header>
      <div class="logo"><span>TechVita</span><span>Soluções</span></div>
      <div class="header-lista">
        <nav class="header-nav">
          <ul>
            <li>
              <a href="">Início</a>
            </li>
            <li>
              <a href="">Conta</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="pai">
        <div class="main-lista">
          <input type="text" class="input" oninput="procurar()" id="ipt-procurar">
          <nav class="main-nav">
            <li class="lista">Sala 1</li>
            <li class="lista">Sala 2</li>
            <li class="lista">Sala 3</li>
            <li class="lista">Sala 4</li>
            <li class="lista">Sala 5</li>
          </nav>
        </div>
        <div class="div-dashboard">
        <div class="div-infos">
          <div class="info">
            <canvas id="info"></canvas>
          </div>
          <div class="info">
            <canvas id="tempalta"></canvas>
          </div>
          <div class="info">
            <canvas id="tempbaixa"></canvas>
          </div>
          <div class="info">
            <canvas id="estabilidade"></canvas>
          </div>
          </div>
          <div class="dashboard">
            <canvas id="dashboard"></canvas>
          </div>
        </div>
      </div>
    </main>

    <footer>© 2026 Temperatura nas UTIs | Todos os direitos reservados</footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="source/script.js"></script>
  </body>
</html>
