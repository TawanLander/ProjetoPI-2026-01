<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechVita - Cadastro</title>
    <link rel="stylesheet" href="./sources/style.css">
    <link rel="icon" href="#" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>
<body>
    <div id="container">
        <div id="logo">
            <img src="../imgs/TechVita.png">
        </div>

        <div id="container_campos">
            <h3>CADASTRO <br></h3>
                <input type="text" id="ipt_idInst" placeholder="Identificador da Instituição" oninput="verificarCodigo()">
                <div class="erro sumir" id="erro-idInst">Erro! O Id não pertence a nenhuma instituição.</div>
                <input type="text" id="ipt_nome" placeholder="Nome" oninput="verificarNome()">

                <input type="text" id="ipt_email" placeholder="Email" oninput="verificarEmail()">
                <div class="erro sumir" id="erro-email">Erro! Verifique a digitação do email.</div>
                <button onclick="guardarValores()" id="botao">AVANÇAR</button>

                <div id="mensagem"></div>

                <span>Já possui uma conta? <a href="./login.html">Logar</a></span>
        </div>

</body>
</html>
<script src="./sources/script.js" defer></script>
